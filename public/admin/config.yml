# Sveltia CMS configuration for The Community Church demo.
# Sveltia is Decap-compatible — field widgets and collection types are identical.
# Docs: https://github.com/sveltia/sveltia-cms

# Disable the live-preview pane — it renders raw JSON field values which is
# confusing for non-technical editors. Per-collection overrides can re-enable it
# selectively if needed.
editor:
  preview: false

site_url: https://sephatron.github.io/community-church-demo
display_url: https://sephatron.github.io/community-church-demo

backend:
  name: github
  repo: Sephatron/community-church-demo
  branch: main
  # The OAuth proxy Worker URL — replace with the deployed Worker URL after
  # Joe deploys sveltia-cms-auth (see docs/WIRING_STEPS.md).
  # Until then, editors can authenticate via a Personal Access Token in Sveltia's
  # settings panel (no backend change needed for that path).
  base_url: https://sveltia-cms-auth.jwhittaker.workers.dev

# Cloudflare Pages serves at root, so the public path is simply /.
public_folder: /
media_folder: public/uploads
media_public_folder: /uploads

# ---------------------------------------------------------------------------
# Events collection — maps to src/content/events/*.json
# The folder, extension, and format must match the files the Astro Content
# Collection reads. JSON with no frontmatter delimiter.
# ---------------------------------------------------------------------------
collections:
  - name: events
    label: Events
    label_singular: Event
    folder: src/content/events
    create: true
    delete: true
    extension: json
    format: json
    # Slug is derived from the title field, lowercased and hyphenated by Sveltia.
    slug: "{{slug}}"
    summary: "{{title}} — {{when}}"
    fields:
      - label: Title
        name: title
        widget: string
        hint: "e.g. \"Play On — Live Music Night\""

      - label: Category
        name: category
        widget: select
        options:
          - Whole church
          - Youth
          - Children & Families
          - Foodbank
          - Community

      - label: Date
        name: date
        widget: datetime
        format: YYYY-MM-DD
        date_format: DD MMMM YYYY
        time_format: false
        required: false
        hint: "Leave blank for recurring events (Sundays, Foodbank, Youth)."

      - label: When (display text)
        name: when
        widget: string
        hint: "Human-readable. e.g. \"Every Sunday · 10:30am\" or \"Friday 11 July · 7:00–9:30pm\""

      - label: Location
        name: location
        widget: string
        hint: "e.g. \"The Beehive, Honiton\""

      - label: Description
        name: description
        widget: text
        hint: "One or two sentences shown on the event card."

      - label: Recurring
        name: recurring
        widget: boolean
        default: false
        hint: "Tick for standing weekly/regular rhythms (shows \"Weekly\" badge and sorts to the top)."

  # ---------------------------------------------------------------------------
  # Navigation — single file at src/content/navigation/main.json.
  # Exposes the main menu as editable data. Both Header and Footer read from
  # this file. Labels are the high-frequency edit; hrefs change rarely.
  # ---------------------------------------------------------------------------
  - name: navigation
    label: Navigation
    files:
      - label: Main Menu
        name: main
        file: src/content/navigation/main.json
        fields:
          - label: Menu Items
            name: items
            widget: list
            label_singular: Menu Item
            hint: "The items that appear in the header navigation and footer. Drag to reorder."
            fields:
              - label: Label
                name: label
                widget: string
                hint: "The text shown in the menu. e.g. \"I'm New\" or \"About\""

              - label: URL / Path
                name: href
                widget: string
                hint: "Internal path (e.g. /about) or full external URL (e.g. https://…). Must start with / for internal pages."

              - label: Dropdown items
                name: children
                widget: list
                required: false
                label_singular: Dropdown Item
                hint: "Optional sub-menu items shown when hovering this menu item. Leave empty for top-level links with no dropdown."
                fields:
                  - label: Label
                    name: label
                    widget: string
                    hint: "e.g. \"Our Vision & Values\""

                  - label: URL / Path
                    name: href
                    widget: string
                    hint: "e.g. /about/vision-values"

  # ---------------------------------------------------------------------------
  # Site settings — single file at src/content/site-settings/settings.json.
  # Exposes safe theme tokens, service facts, contact details, brand strings,
  # socials, and footer copy without opening the codebase.
  # ---------------------------------------------------------------------------
  - name: site-settings
    label: Site Settings & Theme
    # `files` type = a named list of individual files rather than a folder of entries.
    files:
      - label: Settings
        name: settings
        file: src/content/site-settings/settings.json
        fields:
          # ---- Service facts ----
          - label: "Service — Day"
            name: serviceDay
            widget: string
            hint: "e.g. \"Sundays\". Used everywhere the service day appears."

          - label: "Service — Time"
            name: serviceTime
            widget: string
            hint: "e.g. \"10:30am\". Used everywhere the service time appears."

          - label: "Service — Venue"
            name: serviceVenue
            widget: string
            hint: "e.g. \"The Beehive\". Used in the footer and homepage cards."

          - label: "Service — Area / Town"
            name: serviceArea
            widget: string
            hint: "e.g. \"Honiton\". Used alongside the venue in several places."

          - label: "Service — Doors open"
            name: serviceArrive
            widget: string
            hint: "e.g. \"10:00am\". Shown on the homepage Plan Your Sunday card."

          - label: "Service — Duration"
            name: serviceDuration
            widget: string
            hint: "e.g. \"around 90 minutes\". Shown on the homepage Plan Your Sunday card."

          # ---- Contact ----
          - label: "Contact — Email"
            name: contactEmail
            widget: string
            hint: "Main office email address."

          - label: "Contact — Phone"
            name: contactPhone
            widget: string
            hint: "e.g. \"01404 43800\""

          - label: "Contact — Office address"
            name: contactOffice
            widget: string
            hint: "Full postal address shown on the contact page."

          - label: "Contact — Foodbank email"
            name: contactFoodbankEmail
            widget: string
            hint: "Foodbank-specific email address."

          - label: "Contact — Foodbank phone"
            name: contactFoodbankPhone
            widget: string
            hint: "Foodbank-specific phone number."

          # ---- Brand / identity ----
          - label: "Church name"
            name: churchName
            widget: string
            hint: "The full church name. Used in the browser tab title and meta tags."

          - label: "Tagline"
            name: churchTagline
            widget: string
            hint: "One-sentence tagline shown in the footer and page meta description."

          - label: "Family of churches line"
            name: churchFamily
            widget: string
            hint: "The line about Commission / Newfrontiers shown in the footer and the homepage Welcome section."

          - label: "Charity number"
            name: charityNo
            widget: string
            hint: "Registered charity number shown in the footer."

          # ---- Social URLs ----
          - label: "Social — Facebook URL"
            name: socialFacebook
            widget: string
            hint: "Full URL to the church Facebook page."

          - label: "Social — Instagram URL"
            name: socialInstagram
            widget: string
            hint: "Full URL to the church Instagram profile."

          - label: "Social — Twitter / X URL"
            name: socialTwitter
            widget: string
            hint: "Full URL to the church Twitter/X account."

          - label: "Social — SoundCloud URL"
            name: socialSoundCloud
            widget: string
            hint: "Full URL to the church SoundCloud profile (used for the sermon player)."

          # ---- Giving ----
          - label: "Give — external URL"
            name: giveUrl
            widget: string
            hint: "The URL of the external giving page (e.g. the real thecommunitychurch.co.uk giving page). The demo does not process payments."

          # ---- Footer copy ----
          # Note: the "Visit us" sentence in the footer is rendered directly in
          # Footer.astro with bold spans — it is not a CMS-editable token template.
          # The service facts above (venue, area, time) control what appears there.

          - label: "Footer — Bottom line"
            name: footerBottomLine
            widget: string
            hint: "The small text at the very bottom of the footer (e.g. the demo disclaimer)."

          # ---- Theme tokens ----
          - label: "Theme — Clay (accent)"
            name: colorClay
            widget: color
            default: "#C43C11"
            hint: "Primary brand accent colour. Used for headings, badges, and buttons."

          - label: "Theme — Paper (background)"
            name: colorPaper
            widget: color
            default: "#FAF6EF"
            hint: "Site background colour."

          - label: "Theme — Ink (text)"
            name: colorInk
            widget: color
            default: "#14100E"
            hint: "Main text colour. Keep contrast ratio vs Paper above 7:1 for accessibility."

          - label: "Hero accent text"
            name: heroAccentText
            widget: string
            default: "Jesus"
            hint: "The highlighted word in \"Lives changed by ___ in East Devon\" on the homepage. Note: the Homepage entry also has an Accent Word field — the Homepage entry takes priority if set."

  # ---------------------------------------------------------------------------
  # Pages — per-page content entries. Phase A: Homepage only.
  # Each section is wrapped in an object widget with collapsed: true so the
  # editor sees six tidy collapsible section headings (Hero, Welcome,
  # Plan Your Sunday, Sermons, Find Your Place, Give) rather than a wall of
  # ~38 flat fields. The JSON shape matches src/content/pages/home.json.
  # ---------------------------------------------------------------------------
  - name: pages
    label: Pages
    files:
      - label: Homepage
        name: home
        file: src/content/pages/home.json
        fields:
          # ---- Hero ----
          - label: Hero
            name: hero
            widget: object
            collapsed: true
            hint: "The full-screen section at the top of the homepage."
            fields:
              - label: Eyebrow
                name: eyebrow
                widget: string
                hint: "Small text above the headline. e.g. \"The Community Church · Honiton\""

              - label: "Headline — before the accent word"
                name: headingBefore
                widget: string
                hint: "The words before the clay-coloured accent word. e.g. \"Lives changed by\""

              - label: "Headline — accent word"
                name: accentWord
                widget: string
                hint: "The highlighted word in the headline (shown in clay/orange). e.g. \"Jesus\""

              - label: "Headline — after the accent word"
                name: headingAfter
                widget: string
                hint: "The words after the clay-coloured accent word. e.g. \"in East Devon.\""

              - label: Subtitle
                name: subtitle
                widget: text
                hint: "The sentence below the headline. Use {venue}, {area}, {time} to insert service facts automatically."

              - label: "Primary button label"
                name: primaryCtaLabel
                widget: string
                hint: "e.g. \"Plan your first visit\""

              - label: "Secondary button label"
                name: secondaryCtaLabel
                widget: string
                hint: "e.g. \"What happens on a Sunday\""

          # ---- Welcome ----
          - label: Welcome
            name: welcome
            widget: object
            collapsed: true
            hint: "The two-column welcome section with the photo."
            fields:
              - label: Eyebrow
                name: eyebrow
                widget: string
                hint: "Small label above the section heading. e.g. \"Welcome\""

              - label: Heading
                name: heading
                widget: string
                hint: "The main heading of the Welcome section."

              - label: "First paragraph"
                name: body1
                widget: text
                hint: "The welcoming paragraph. Plain text — no HTML."

              - label: "Second paragraph (family line)"
                name: body2
                widget: string
                hint: "The family-of-churches line. Leave blank to use the value from Site Settings automatically."

              - label: "Primary button label"
                name: primaryCtaLabel
                widget: string
                hint: "e.g. \"I'm new here\""

              - label: "Secondary button label"
                name: secondaryCtaLabel
                widget: string
                hint: "e.g. \"Our vision & values\""

              - label: "Badge number"
                name: badgeNumber
                widget: string
                hint: "The large number on the badge over the photo. e.g. \"90\" (for 90 minutes)."

              - label: "Badge caption"
                name: badgeCaption
                widget: text
                hint: "The small caption below the badge number. e.g. \"music, teaching\\n& good coffee\""

          # ---- Plan Your Sunday ----
          - label: "Plan Your Sunday"
            name: planSunday
            widget: object
            collapsed: true
            hint: "The dark section with three cards — When, Where, What to expect."
            fields:
              - label: Eyebrow
                name: eyebrow
                widget: string
                hint: "Small label above the section heading. e.g. \"Plan your Sunday\""

              - label: Heading
                name: heading
                widget: string
                hint: "The main heading of the Plan Your Sunday section."

              - label: "Card 1 — Title"
                name: card1Title
                widget: string
                hint: "Heading for the first card (clock icon). e.g. \"When\""

              - label: "Card 1 — Body"
                name: card1Body
                widget: text
                hint: "Body text for the When card. Use {day}, {time}, {arrive} for service facts. The service time will be shown in bold automatically."

              - label: "Card 2 — Title"
                name: card2Title
                widget: string
                hint: "Heading for the second card (pin icon). e.g. \"Where\""

              - label: "Card 2 — Body"
                name: card2Body
                widget: text
                hint: "Body text for the Where card. Use {venue}, {area} for service facts."

              - label: "Card 3 — Title"
                name: card3Title
                widget: string
                hint: "Heading for the third card (lines icon). e.g. \"What to expect\""

              - label: "Card 3 — Body"
                name: card3Body
                widget: text
                hint: "Body text for the What to Expect card. Plain text."

          # ---- Sermons ----
          - label: Sermons
            name: sermons
            widget: object
            collapsed: true
            hint: "The section with the SoundCloud sermon player."
            fields:
              - label: Eyebrow
                name: eyebrow
                widget: string
                hint: "Small label above the section heading. e.g. \"Sermons\""

              - label: Heading
                name: heading
                widget: string
                hint: "The main heading of the Sermons section."

              - label: Body
                name: body
                widget: text
                hint: "One or two sentences introducing the sermon player."

              - label: "Button label"
                name: ctaLabel
                widget: string
                hint: "e.g. \"Browse all sermons\""

          # ---- Find Your Place ----
          - label: "Find Your Place"
            name: findYourPlace
            widget: object
            collapsed: true
            hint: "The teal section with four image tiles."
            fields:
              - label: Eyebrow
                name: eyebrow
                widget: string
                hint: "Small label above the section heading. e.g. \"Find your place\""

              - label: Heading
                name: heading
                widget: string
                hint: "The main heading of the Find Your Place section."

              - label: "Tile 1 — Title"
                name: tile1Title
                widget: string
                hint: "Title on the Sundays tile. e.g. \"Sundays\""

              - label: "Tile 1 — Blurb"
                name: tile1Blurb
                widget: string
                hint: "Short caption on the Sundays tile. e.g. \"What a morning looks like →\""

              - label: "Tile 2 — Title"
                name: tile2Title
                widget: string
                hint: "Title on the Children & Youth tile."

              - label: "Tile 2 — Blurb"
                name: tile2Blurb
                widget: string
                hint: "Short caption on the Children & Youth tile."

              - label: "Tile 3 — Title"
                name: tile3Title
                widget: string
                hint: "Title on the Foodbank tile."

              - label: "Tile 3 — Blurb"
                name: tile3Blurb
                widget: string
                hint: "Short caption on the Foodbank tile."

              - label: "Tile 4 — Title"
                name: tile4Title
                widget: string
                hint: "Title on the Satellites tile."

              - label: "Tile 4 — Blurb"
                name: tile4Blurb
                widget: string
                hint: "Short caption on the Satellites tile."

          # ---- Give / CTA band ----
          - label: Give
            name: give
            widget: object
            collapsed: true
            hint: "The clay-coloured giving band at the bottom of the page."
            fields:
              - label: Heading
                name: heading
                widget: string
                hint: "The large heading on the clay-coloured Give band."

              - label: Body
                name: body
                widget: text
                hint: "One or two sentences below the Give heading."

              - label: "Button label"
                name: ctaLabel
                widget: string
                hint: "e.g. \"Give to the church\""
